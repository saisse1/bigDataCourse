version: '3.8'

services:
  postgres:
    build: .
    container_name: postgres_logs_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_logs_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./datasets:/datasets
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh

volumes:
  pgdata: